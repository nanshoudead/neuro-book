defaultPlayerActor: player
defaultActorProfile: rp.actor
defaultWriterProfile: rp.writer

subjects:
  - id: player
    name: 玩家角色
    kind: player
    profile: rp.actor
    instruction: simulation/subjects/player/subject.md
    events: simulation/subjects/player/events.md
    knowledge: simulation/subjects/player/knowledge.md
    mind: simulation/subjects/player/mind.md
    state: simulation/subjects/player/state.md
    controlledBy: user
    defaultActive: true
    canonicalSource: null

  - id: sample-npc
    name: 示例 NPC
    kind: npc
    profile: rp.actor
    instruction: simulation/subjects/sample-npc/subject.md
    events: simulation/subjects/sample-npc/events.md
    knowledge: simulation/subjects/sample-npc/knowledge.md
    mind: simulation/subjects/sample-npc/mind.md
    state: simulation/subjects/sample-npc/state.md
    canonicalSource: null
    defaultActive: true

notes:
  - 重要配角建议一个角色一个 subject simulator。
  - 不重要 NPC、路人、服务员、临时敌人等可以由同一个 subject simulator 统筹扮演。
  - 如果 sample-npc 变成群演 subject，请在它的 subject.md 中列出可扮演的 NPC 范围。
  - 如果不想启用示例 NPC，把 defaultActive 改为 false，或把它替换成真实角色。
