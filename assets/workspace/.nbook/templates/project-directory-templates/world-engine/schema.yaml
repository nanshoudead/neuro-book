# World Engine subject schema.
# 这是第一版通用模板：项目可以按自己的世界观增删 subject type 与 attrs。
subjectTypes:
  world:
    desc: 世界本身，承载纪元、世界级状态和大事记
    attrs:
      era: { kind: scalar, type: text, default: "复兴纪元" }
      currentYear: { kind: scalar, type: int, default: 1 }
      events: { kind: list, itemType: text, default: [] }

  character:
    desc: 角色主体；默认对接 simulation/subjects 六文件主体系统
    attrs:
      hp: { kind: scalar, type: int, default: 100 }
      maxHp: { kind: scalar, type: int, default: 100 }
      location: { kind: scalar, type: ref(location) }
      faction: { kind: scalar, type: ref(faction) }
      mind: { kind: scalar, type: text }
      memory: { kind: object, itemType: text }
      inventory: { kind: collection, itemType: ref(item), default: [] }
      events: { kind: list, itemType: text, default: [] }
      sourcePath: { kind: scalar, type: text, desc: "simulation/subjects/<id> 根路径" }
      legacyKind: { kind: scalar, type: text }
      controlledBy: { kind: scalar, type: text }
      profile: { kind: scalar, type: text }
      canonicalSource: { kind: scalar, type: text }
      subjectFiles: { kind: object, itemType: text, desc: "六文件主体系统文件拓扑：subject/soul/events/memory/mind/state" }
      actorImportPath: { kind: scalar, type: text, desc: "actor 主路直接 Import 的文件路径" }
      leaderOnlyPath: { kind: scalar, type: text, desc: "仅 simulator.leader 可见的全知文件路径" }
      directStatePath: { kind: scalar, type: text, desc: "上级直接读取的可见状态文件路径" }
      ragIndexSources: { kind: object, itemType: text, desc: "Subject RAG 索引源，通常为 events.jsonl 和 memory.jsonl" }
      eventCount: { kind: scalar, type: int, default: 0 }
      memoryCount: { kind: scalar, type: int, default: 0 }
      subjectSystemVersion: { kind: scalar, type: text }

  faction:
    desc: 阵营、国家、组织或政治实体
    attrs:
      name: { kind: scalar, type: text }
      capital: { kind: scalar, type: ref(location) }
      treasury: { kind: scalar, type: int, default: 0 }
      events: { kind: list, itemType: text, default: [] }

  location:
    desc: 地点、区域或可停留空间
    attrs:
      name: { kind: scalar, type: text }
      control: { kind: scalar, type: ref(faction) }
      events: { kind: list, itemType: text, default: [] }

  item:
    desc: 需要独立追踪状态的物品
    attrs:
      name: { kind: scalar, type: text }
      durability: { kind: scalar, type: int, default: 100 }
      enchants: { kind: collection, itemType: text, default: [] }
      events: { kind: list, itemType: text, default: [] }
