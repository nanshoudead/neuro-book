name: Release NeuroBook Manager

on:
  push:
    tags:
      - manager-v*

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag and package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          expected="manager-v${package_version}"
          test "${GITHUB_REF_NAME}" = "${expected}"

      - name: Verify package
        run: |
          bun run manager:typecheck
          bun run manager:test
          bun run manager:pack

      - name: Publish package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          package_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          if [[ "${package_version}" == *-* ]]; then
            dist_tag=canary
          else
            dist_tag=latest
          fi
          bun publish --cwd packages/neuro-book-manager --access public --tag "${dist_tag}"
