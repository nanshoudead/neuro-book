name: Release NeuroBook Manager

on:
  push:
    tags:
      - manager-v*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up npm Trusted Publishing client
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag and package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          expected="manager-v${package_version}"
          test "${GITHUB_REF_NAME}" = "${expected}"

      - name: Verify package
        run: |
          bun run manager:typecheck
          bun run manager:test
          bun run manager:pack

      - name: Publish package
        shell: bash
        run: |
          package_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          if [[ "${package_version}" == *-* ]]; then
            dist_tag=canary
          else
            dist_tag=latest
          fi
          npm publish --workspace packages/neuro-book-manager --access public --tag "${dist_tag}" --provenance
