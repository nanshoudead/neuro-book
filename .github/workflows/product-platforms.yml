name: Product Platform Checks

on:
  pull_request:
    paths:
      - ".github/workflows/product-platforms.yml"
      - ".github/workflows/release-container.yml"
      - "Dockerfile"
      - "app/**"
      - "assets/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "server/**"
      - "shared/**"
      - "bun.lock"
      - "nuxt.config.ts"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  product:
    name: ${{ matrix.platform }} Product
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-aarch64-glibc
            runner: ubuntu-24.04-arm
            command: release:product:linux-aarch64
            archive: neuro-book-product-linux-aarch64-glibc.tar.gz
            port: 39224
            browser: playwright
          - platform: darwin-x64
            runner: macos-15-intel
            command: release:product:darwin
            archive: neuro-book-product-darwin-x64.tar.gz
            port: 39225
            browser: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
          - platform: darwin-aarch64
            runner: macos-15
            command: release:product:darwin-aarch64
            archive: neuro-book-product-darwin-aarch64.tar.gz
            port: 39226
            browser: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - name: Verify POSIX Stage 0 behavior
        run: bun run test:install
      - name: Verify Manager platform contracts
        run: bun run manager:test
      - run: bun run nuxt:build
      - run: bun run release:source
      - run: bun run ${{ matrix.command }}
      - name: Install Playwright Chromium
        if: matrix.browser == 'playwright'
        run: bunx playwright-core install --with-deps chromium
      - name: Verify native Product
        shell: bash
        run: |
          version="$(bun -e 'console.log(require("./package.json").version)')"
          bash scripts/release/verify-posix-product.sh \
            "${{ matrix.platform }}" \
            dist/neuro-book-source.zip \
            "dist/${{ matrix.archive }}" \
            "${version}" \
            "${{ matrix.port }}" \
            "${{ matrix.browser }}"
      - name: Upload native Product diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-product-diagnostics
          if-no-files-found: ignore
          path: ${{ runner.temp }}/neuro-book-${{ matrix.platform }}-smoke/*
