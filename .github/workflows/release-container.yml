name: Release Product Assets

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/neuro-book
  RUNTIME_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/neuro-book-runtime

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app-digest: ${{ steps.app-build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: runtime-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RUNTIME_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

      - id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - id: app-build
        name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=runtime
            type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run release:source
      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: dist/neuro-book-source.zip

  product-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - name: Verify Agent State Root paths
        run: bun run test:agent-state-root
      - run: bun run nuxt:build
      - run: bun run release:product:linux
      - uses: actions/upload-artifact@v4
        with:
          name: product-linux
          path: dist/neuro-book-product-linux-x64-glibc.tar.gz

  product-windows:
    needs: source
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - name: Verify Agent State Root paths
        run: bun run test:agent-state-root
      - run: bun run nuxt:build
      - uses: actions/download-artifact@v4
        with:
          name: source
          path: dist
      - run: bun run release:product:windows
      - run: bun run package:windows-portable
      - uses: actions/upload-artifact@v4
        with:
          name: product-windows
          path: |
            dist/neuro-book-product-windows-x64.zip
            dist/neuro-book-windows-x64.zip

  assemble:
    needs: [build-and-push, source, product-linux, product-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: source
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: product-linux
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: product-windows
          path: dist
      - name: Build release manifest
        shell: bash
        env:
          GHCR_DIGEST: ${{ needs.build-and-push.outputs.app-digest }}
        run: |
          cp scripts/install/install.ps1 dist/install.ps1
          cp scripts/install/install.cmd dist/install.cmd
          cp scripts/install/install.sh dist/install.sh
          manager_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          bun run manager:build
          mkdir -p manager-npm
          npm pack "@notnotype/neuro-book-manager@${manager_version}" --pack-destination manager-npm >/dev/null
          mkdir -p manager-npm/package
          tar -xzf manager-npm/*.tgz -C manager-npm
          cmp packages/neuro-book-manager/dist/neuro-book.mjs manager-npm/package/dist/neuro-book.mjs
          cmp packages/neuro-book-manager/dist/schema.mjs manager-npm/package/dist/schema.mjs
          unzip -p dist/neuro-book-windows-x64.zip ".runtime/manager/${manager_version}/neuro-book.mjs" > manager-npm/portable-neuro-book.mjs
          cmp manager-npm/package/dist/neuro-book.mjs manager-npm/portable-neuro-book.mjs
          bun scripts/release/release-assets.ts manifest \
            --tag "${{ github.event.release.tag_name }}" \
            --revision "${{ github.sha }}" \
            --manager-version "${manager_version}" \
            --source dist/neuro-book-source.zip \
            --windows-product dist/neuro-book-product-windows-x64.zip \
            --linux-product dist/neuro-book-product-linux-x64-glibc.tar.gz \
            --portable dist/neuro-book-windows-x64.zip \
            --stage0-windows dist/install.ps1 \
            --stage0-windows-cmd dist/install.cmd \
            --stage0-linux dist/install.sh \
            --ghcr-ref "${APP_IMAGE_NAME}:${{ github.event.release.tag_name }}" \
            --ghcr-digest "${GHCR_DIGEST}" \
            --output dist/release-manifest.json
      - name: Upload candidate release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: |
            dist/neuro-book-source.zip
            dist/neuro-book-product-windows-x64.zip
            dist/neuro-book-product-linux-x64-glibc.tar.gz
            dist/neuro-book-windows-x64.zip
            dist/release-manifest.json
            dist/SHA256SUMS
            dist/install.ps1
            dist/install.cmd
            dist/install.sh

  verify-linux:
    needs: [assemble, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: candidate-assets
      - name: Verify assets and native packages
        run: bun scripts/release/release-assets.ts verify --dir candidate-assets --tag "${{ github.event.release.tag_name }}" --revision "${{ github.sha }}"
      - name: Verify POSIX Stage 0 syntax
        run: bash -n candidate-assets/install.sh
      - name: Verify GHCR digest and source revision
        env:
          IMAGE: ${{ env.APP_IMAGE_NAME }}@${{ needs.build-and-push.outputs.app-digest }}
        run: |
          docker pull "${IMAGE}"
          test "$(docker image inspect "${IMAGE}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "${{ github.sha }}"
      - name: Verify Linux Product Agent State Root
        shell: bash
        run: |
          set -euo pipefail
          rm -rf product-browser-smoke product-agent-state-root product-agent-state-root-moved
          mkdir -p product-browser-smoke
          unzip -q candidate-assets/neuro-book-source.zip -d product-browser-smoke
          tar -xzf candidate-assets/neuro-book-product-linux-x64-glibc.tar.gz -C product-browser-smoke
          product_root="$PWD/product-browser-smoke"
          state_root="$PWD/product-agent-state-root"
          test ! -e "${product_root}/node_modules"
          (
            cd "${product_root}"
            NEURO_BOOK_APPLICATION_ROOT="${product_root}" \
            NEURO_BOOK_STATE_ROOT="${state_root}" \
            bun .output/server/scripts/deploy/product-agent-attachment-migration-smoke.ts
            NEURO_BOOK_APPLICATION_ROOT="${product_root}" \
            NEURO_BOOK_STATE_ROOT="${state_root}" \
            bun .output/server/scripts/deploy/product-agent-state-root-smoke.ts
          )
          test ! -e "${product_root}/workspace"
          test ! -e "${state_root}"
          test -d "${state_root}-moved/workspace"
      - name: Verify Linux Product in a real browser
        shell: bash
        run: |
          set -euo pipefail
          cat > product-browser-smoke/config.yaml <<'EOF'
          server:
            host: 0.0.0.0
            port: 39124
          database:
            kind: sqlite
            url: file:workspace/.nbook/neuro-book.sqlite
          auth:
            enabled: false
          EOF
          mkdir -p product-browser-smoke/workspace product-browser-smoke/logs
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          port=39124
          export NODE_ENV=production
          export NUXT_PORT="${port}"
          export PORT="${port}"
          export NEURO_BOOK_APPLICATION_ROOT="$PWD/product-browser-smoke"
          export NEURO_BOOK_STATE_ROOT="$PWD/product-browser-smoke"
          bun product-browser-smoke/.output/server/scripts/db/prisma-migrate.mjs --deploy
          setsid bun product-browser-smoke/.output/server/scripts/deploy/product-start.mjs >product-browser-smoke.log 2>&1 &
          product_pid=$!
          cleanup() {
            kill -- "-${product_pid}" 2>/dev/null || true
            wait "${product_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 120); do
            if curl --fail --silent "http://127.0.0.1:${port}/api/app/version" >/dev/null; then break; fi
            if ! kill -0 "${product_pid}" 2>/dev/null; then
              cat product-browser-smoke.log
              exit 1
            fi
            sleep 0.5
          done
          if ! curl --fail --silent "http://127.0.0.1:${port}/api/app/version" >/dev/null; then
            cat product-browser-smoke.log
            exit 1
          fi
          if ! node --import tsx scripts/deploy/product-browser-smoke.ts \
            --url "http://127.0.0.1:${port}" \
            --expected-version "${version}" \
            --browser-executable /usr/bin/google-chrome \
            --screenshot "$PWD/product-browser-smoke-failure.png"; then
            cat product-browser-smoke.log
            exit 1
          fi
      - name: Public Manager CLI smoke
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          if [[ "${version}" == *-* ]]; then manager_tag=canary; channel=canary; else manager_tag=latest; channel=stable; fi
          bunx --bun "@notnotype/neuro-book-manager@${manager_tag}" --version
          bunx --bun "@notnotype/neuro-book-manager@${manager_tag}" status --help
      - name: Upload Linux browser smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-product-browser-smoke-diagnostics
          if-no-files-found: ignore
          path: |
            product-browser-smoke.log
            product-browser-smoke-failure.png
            product-agent-state-root-moved/logs/**
            product-agent-state-root-moved/workspace/.nbook/logs/**

  verify-windows:
    needs: [assemble]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: candidate-assets
      - name: Verify Portable executables and doctor
        shell: pwsh
        run: |
          Expand-Archive -LiteralPath candidate-assets/neuro-book-windows-x64.zip -DestinationPath portable
          $portableRoot = (Resolve-Path portable).Path
          $manifest = Get-Content -Raw (Join-Path $portableRoot ".deploy/installation.json") | ConvertFrom-Json
          & (Join-Path $portableRoot $manifest.components.managerRuntime.path) --version
          & (Join-Path $portableRoot $manifest.components.tools.rg.path) --version
          & (Join-Path $portableRoot $manifest.components.tools.git.path) --version
          & (Join-Path $portableRoot $manifest.components.tools.git.bashPath) --version
          $launcherNames = @(
            "Start Neuro Book.cmd", "Start Neuro Book.ps1",
            "Update Neuro Book.cmd", "Update Neuro Book.ps1",
            "Create Admin.cmd", "Create Admin.ps1"
          )
          foreach ($launcherName in $launcherNames) {
            $launcherPath = Join-Path $portableRoot $launcherName
            if (-not (Test-Path -LiteralPath $launcherPath)) { throw "Portable缺少Launcher：$launcherName" }
            $launcher = Get-Content -Raw -LiteralPath $launcherPath
            if ($launcher -notmatch "neuro-book\.cmd" -or $launcher -notmatch "--root") {
              throw "Portable Launcher未委托Manager：$launcherName"
            }
          }
          $env:NO_COLOR = "1"
          $manager = Join-Path $portableRoot ".runtime/bin/neuro-book.cmd"
          $doctorOutput = @(& $manager --root $portableRoot doctor --json)
          $doctorExitCode = $LASTEXITCODE
          if ($doctorExitCode -ne 0) {
            $doctorOutput | Write-Host
            throw "Portable doctor执行失败，退出码$doctorExitCode"
          }
          $doctor = ($doctorOutput -join "`n") | ConvertFrom-Json
          if (-not $doctor.healthy) {
            $doctor.checks |
              Where-Object { $_.status -eq "fail" } |
              ForEach-Object {
                Write-Host ("[FAIL] {0}: {1}" -f $_.id, $_.message)
                if ($_.remediation) { Write-Host ("       修复建议：{0}" -f $_.remediation) }
              }
            throw "Portable doctor 未通过"
          }
          $managerBackup = "$manager.release-verify-backup"
          Copy-Item -LiteralPath $manager -Destination $managerBackup
          try {
            Set-Content -LiteralPath $manager -Encoding ascii -Value @'
          @echo off
          > "%NEURO_BOOK_LAUNCHER_CAPTURE%" echo %~1
          >> "%NEURO_BOOK_LAUNCHER_CAPTURE%" echo %~2
          >> "%NEURO_BOOK_LAUNCHER_CAPTURE%" echo %~3
          if not "%~4"=="" >> "%NEURO_BOOK_LAUNCHER_CAPTURE%" echo %~4
          exit /b 0
          '@
            $cmdCases = @(
              @{ Name = "Start Neuro Book.cmd"; Expected = @("--root", $portableRoot, "start") },
              @{ Name = "Update Neuro Book.cmd"; Expected = @("--root", $portableRoot, "update") },
              @{ Name = "Create Admin.cmd"; Expected = @("--root", $portableRoot, "admin", "create") }
            )
            foreach ($case in $cmdCases) {
              $capture = Join-Path $portableRoot ".deploy/launcher-args.txt"
              Remove-Item -LiteralPath $capture -Force -ErrorAction SilentlyContinue
              $env:NEURO_BOOK_LAUNCHER_CAPTURE = $capture
              & (Join-Path $portableRoot $case.Name)
              if ($LASTEXITCODE -ne 0) { throw "Portable CMD Launcher执行失败：$($case.Name)" }
              $actual = @(Get-Content -LiteralPath $capture)
              if (Compare-Object -ReferenceObject $case.Expected -DifferenceObject $actual) {
                throw "Portable CMD Launcher参数错误：$($case.Name)，实际参数：$($actual -join ' | ')"
              }
            }
          } finally {
            Remove-Item Env:NEURO_BOOK_LAUNCHER_CAPTURE -ErrorAction SilentlyContinue
            Move-Item -LiteralPath $managerBackup -Destination $manager -Force
          }
      - name: Verify Windows Portable Agent State Root
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path portable).Path
          $manifest = Get-Content -Raw (Join-Path $portableRoot ".deploy/installation.json") | ConvertFrom-Json
          $bun = Join-Path $portableRoot $manifest.components.applicationRuntime.path
          $git = Join-Path $portableRoot $manifest.components.tools.git.path
          $bash = Join-Path $portableRoot $manifest.components.tools.git.bashPath
          $rg = Join-Path $portableRoot $manifest.components.tools.rg.path
          $stateRoot = Join-Path $portableRoot "data"
          $movedStateRoot = "$stateRoot-moved"
          if (Test-Path -LiteralPath $movedStateRoot) {
            Remove-Item -LiteralPath $movedStateRoot -Recurse -Force
          }
          $previousPath = $env:PATH
          try {
            $env:PATH = (@(
              (Join-Path $portableRoot ".runtime/bin"),
              (Split-Path -Parent $bun),
              (Split-Path -Parent $rg),
              (Split-Path -Parent $git),
              (Split-Path -Parent $bash),
              $previousPath
            ) -join [System.IO.Path]::PathSeparator)
            $env:NEURO_BOOK_BASH = $bash
            $env:GIT_BASH = $bash
            $env:NEURO_BOOK_APPLICATION_ROOT = $portableRoot
            $env:NEURO_BOOK_STATE_ROOT = $stateRoot
            Push-Location $portableRoot
            try {
              & $bun ".output/server/scripts/deploy/product-agent-attachment-migration-smoke.ts"
              if ($LASTEXITCODE -ne 0) {
                throw "Portable Agent Attachment migration smoke失败：$LASTEXITCODE"
              }
              & $bun ".output/server/scripts/deploy/product-agent-state-root-smoke.ts"
              if ($LASTEXITCODE -ne 0) {
                throw "Portable Agent State Root smoke失败：$LASTEXITCODE"
              }
            } finally {
              Pop-Location
            }
            if (Test-Path -LiteralPath (Join-Path $portableRoot "workspace")) {
              throw "Portable Agent smoke在Installation Root创建了错误workspace目录"
            }
            if (Test-Path -LiteralPath $stateRoot) {
              throw "Portable Agent smoke没有移动原State Root"
            }
            if (-not (Test-Path -LiteralPath (Join-Path $movedStateRoot "workspace"))) {
              throw "Portable Agent smoke移动后的State Root缺少workspace"
            }
            Move-Item -LiteralPath $movedStateRoot -Destination $stateRoot
          } finally {
            $env:PATH = $previousPath
            Remove-Item Env:NEURO_BOOK_BASH -ErrorAction SilentlyContinue
            Remove-Item Env:GIT_BASH -ErrorAction SilentlyContinue
            Remove-Item Env:NEURO_BOOK_APPLICATION_ROOT -ErrorAction SilentlyContinue
            Remove-Item Env:NEURO_BOOK_STATE_ROOT -ErrorAction SilentlyContinue
          }
      - name: Verify Windows Portable shadow workspace diagnosis
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path portable).Path
          $manager = Join-Path $portableRoot ".runtime/bin/neuro-book.cmd"
          $stateWorkspace = Join-Path $portableRoot "data/workspace"
          $shadowWorkspace = Join-Path $portableRoot "workspace"
          $stateMarker = Join-Path $stateWorkspace ".task109-state-marker"
          $shadowMarker = Join-Path $shadowWorkspace ".task109-shadow-marker"
          if (Test-Path -LiteralPath $shadowWorkspace) {
            throw "Portable安装根已有workspace，无法建立隔离shadow诊断夹具"
          }
          New-Item -ItemType Directory -Path $stateWorkspace -Force | Out-Null
          Set-Content -LiteralPath $stateMarker -Value "state-root" -Encoding ascii
          New-Item -ItemType Directory -Path $shadowWorkspace -Force | Out-Null
          Set-Content -LiteralPath $shadowMarker -Value "shadow-root" -Encoding ascii
          $env:NO_COLOR = "1"
          try {
            $doctorOutput = @(& $manager --root $portableRoot doctor --json)
            $doctorExitCode = $LASTEXITCODE
            $doctor = ($doctorOutput -join "`n") | ConvertFrom-Json
            $shadowCheck = @($doctor.checks | Where-Object { $_.id -eq "state.shadow-workspace" })
            if ($shadowCheck.Count -ne 1 -or $shadowCheck[0].status -ne "fail") {
              $doctorOutput | Write-Host
              throw "Portable shadow workspace未被doctor诊断为fail（exit=$doctorExitCode）"
            }
            if (-not $shadowCheck[0].remediation -or $shadowCheck[0].remediation -notmatch "workspace") {
              throw "Portable shadow workspace诊断缺少可执行remediation"
            }
            if ((Get-Content -Raw -LiteralPath $stateMarker).Trim() -ne "state-root") {
              throw "Portable shadow诊断修改了真实State Root数据"
            }
            if ((Get-Content -Raw -LiteralPath $shadowMarker) -notmatch "shadow-root") {
              throw "Portable shadow诊断修改了影子目录数据"
            }
          } finally {
            Remove-Item -LiteralPath $shadowWorkspace -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $stateMarker -Force -ErrorAction SilentlyContinue
            Remove-Item Env:NO_COLOR -ErrorAction SilentlyContinue
          }
          if (Test-Path -LiteralPath $shadowWorkspace) {
            throw "Portable shadow workspace测试目录未清理"
          }
      - name: Verify Windows Portable in a real browser
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path portable).Path
          $manifest = Get-Content -Raw (Join-Path $portableRoot ".deploy/installation.json") | ConvertFrom-Json
          $port = 39123
          $stateRoot = Join-Path $portableRoot "data"
          $envPath = Join-Path $stateRoot ".env"
          $configPath = Join-Path $stateRoot "config.yaml"
          $envContent = Get-Content -Raw -LiteralPath $envPath
          $envContent = $envContent -replace '(?m)^NUXT_PORT=.*$', "NUXT_PORT=$port"
          $envContent = $envContent -replace '(?m)^PORT=.*$', "PORT=$port"
          Set-Content -LiteralPath $envPath -Value $envContent -Encoding utf8NoBOM
          $configContent = Get-Content -Raw -LiteralPath $configPath
          $configContent = $configContent -replace '(?m)^(\s*port:\s*)\d+\s*$', "`${1}$port"
          Set-Content -LiteralPath $configPath -Value $configContent -Encoding utf8NoBOM
          $stdout = Join-Path $portableRoot "data/logs/release-browser-smoke.stdout.log"
          $stderr = Join-Path $portableRoot "data/logs/release-browser-smoke.stderr.log"
          $launcher = Join-Path $portableRoot "Start Neuro Book.cmd"
          $launcherProcess = Start-Process -FilePath $env:ComSpec -ArgumentList @("/d", "/c", "`"$launcher`"") -WorkingDirectory $env:RUNNER_TEMP -RedirectStandardOutput $stdout -RedirectStandardError $stderr -WindowStyle Hidden -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              if ($launcherProcess.HasExited) { break }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:$port/api/app/version" -TimeoutSec 1
                if ($response.StatusCode -eq 200) { $ready = $true; break }
              } catch {}
              Start-Sleep -Milliseconds 500
            }
            if (-not $ready) {
              Get-Content -Raw $stdout -ErrorAction SilentlyContinue | Write-Host
              Get-Content -Raw $stderr -ErrorAction SilentlyContinue | Write-Host
              throw "Start Neuro Book.cmd did not make Portable ready"
            }
            if ($launcherProcess.HasExited) { throw "Start Neuro Book.cmd exited before browser smoke" }
            $chrome = Join-Path $env:ProgramFiles "Google/Chrome/Application/chrome.exe"
            if (-not (Test-Path -LiteralPath $chrome)) {
              $chrome = Join-Path ${env:ProgramFiles(x86)} "Microsoft/Edge/Application/msedge.exe"
            }
            & node --import tsx scripts/deploy/product-browser-smoke.ts `
              --url "http://127.0.0.1:$port" `
              --expected-version $manifest.appVersion `
              --browser-executable $chrome `
              --screenshot (Join-Path $portableRoot "data/logs/release-browser-smoke-failure.png")
            if ($LASTEXITCODE -ne 0) {
              Get-Content -Raw $stdout -ErrorAction SilentlyContinue | Write-Host
              Get-Content -Raw $stderr -ErrorAction SilentlyContinue | Write-Host
              throw "Portable browser smoke failed: $LASTEXITCODE"
            }
            if ($launcherProcess.HasExited) { throw "Start Neuro Book.cmd did not keep the Product in the foreground" }
          } finally {
            if (-not $launcherProcess.HasExited) { taskkill /PID $launcherProcess.Id /T /F | Out-Null }
          }
      - name: Verify Windows Portable authenticated login
        shell: pwsh
        run: |
          $portableRoot = (Resolve-Path portable).Path
          $manager = Join-Path $portableRoot ".runtime/bin/neuro-book.cmd"
          $stateRoot = Join-Path $portableRoot "data"
          $databasePath = Join-Path $stateRoot "workspace/.nbook/neuro-book.sqlite"
          $shadowWorkspace = Join-Path $portableRoot "workspace"
          $stdout = Join-Path $stateRoot "logs/release-auth-smoke.stdout.log"
          $stderr = Join-Path $stateRoot "logs/release-auth-smoke.stderr.log"
          $launcher = Join-Path $portableRoot "Start Neuro Book.cmd"
          $port = 39123
          $env:NO_COLOR = "1"
          $env:AUTH_ADMIN_PASSWORD = "release-auth-smoke-password"
          try {
            & $manager --root $portableRoot admin create release-smoke-admin
            if ($LASTEXITCODE -ne 0) {
              throw "Portable create admin failed: $LASTEXITCODE"
            }
          } finally {
            Remove-Item Env:AUTH_ADMIN_PASSWORD -ErrorAction SilentlyContinue
          }
          if (-not (Test-Path -LiteralPath $databasePath -PathType Leaf)) {
            throw "Portable App SQLite没有位于data/workspace/.nbook"
          }
          if (Test-Path -LiteralPath $shadowWorkspace) {
            throw "Portable创建管理员后在Installation Root产生了影子workspace"
          }
          $launcherProcess = Start-Process -FilePath $env:ComSpec -ArgumentList @("/d", "/c", "`"$launcher`"") -WorkingDirectory $env:RUNNER_TEMP -RedirectStandardOutput $stdout -RedirectStandardError $stderr -WindowStyle Hidden -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              if ($launcherProcess.HasExited) { break }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:$port/api/app/version" -TimeoutSec 1
                if ($response.StatusCode -eq 200) { $ready = $true; break }
              } catch {}
              Start-Sleep -Milliseconds 500
            }
            if (-not $ready) {
              Get-Content -Raw $stdout -ErrorAction SilentlyContinue | Write-Host
              Get-Content -Raw $stderr -ErrorAction SilentlyContinue | Write-Host
              throw "Portable authenticated Product did not become ready"
            }
            $webSession = New-Object Microsoft.PowerShell.Commands.WebRequestSession
            $body = @{ username = "release-smoke-admin"; password = "release-auth-smoke-password" } | ConvertTo-Json -Compress
            $login = Invoke-WebRequest -Uri "http://127.0.0.1:$port/api/auth/login" -Method Post -ContentType "application/json" -Body $body -WebSession $webSession -TimeoutSec 10
            if ($login.StatusCode -ne 200) { throw "Portable login returned HTTP $($login.StatusCode)" }
            $payload = $login.Content | ConvertFrom-Json
            if (-not $payload.authEnabled -or $payload.user.username -ne "release-smoke-admin" -or $payload.user.role -ne "admin") {
              throw "Portable login payload不符合管理员合同"
            }
            if ($webSession.Cookies.Count -lt 1) { throw "Portable login没有写入session cookie" }
            if (Test-Path -LiteralPath $shadowWorkspace) {
              throw "Portable登录后在Installation Root产生了影子workspace"
            }
          } finally {
            if (-not $launcherProcess.HasExited) { taskkill /PID $launcherProcess.Id /T /F | Out-Null }
            Remove-Item Env:NO_COLOR -ErrorAction SilentlyContinue
          }
      - name: Verify Windows Stage 0 syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path candidate-assets/install.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { throw ($errors | Out-String) }
          $cmd = Get-Content -Raw candidate-assets/install.cmd
          if ($cmd -notmatch "install\.ps1") { throw "install.cmd未委托install.ps1" }
      - name: Upload Windows browser smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-browser-smoke-diagnostics
          if-no-files-found: ignore
          path: |
            portable/data/logs/release-browser-smoke*
            portable/data/logs/release-auth-smoke*
            portable/data-moved/logs/**
            portable/data-moved/workspace/.nbook/logs/**

  verify:
    needs: [verify-linux, verify-windows]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release verification completed."

  publish-payload:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: dist
      - name: Publish verified payload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/neuro-book-source.zip
            dist/neuro-book-product-windows-x64.zip
            dist/neuro-book-product-linux-x64-glibc.tar.gz
            dist/neuro-book-windows-x64.zip
            dist/install.ps1
            dist/install.cmd
            dist/install.sh

  verify-public-payload:
    needs: [publish-payload, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: candidate-assets
      - name: Download public payload assets
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir public-assets
          cp candidate-assets/release-manifest.json candidate-assets/SHA256SUMS public-assets/
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          for asset in \
            neuro-book-source.zip \
            neuro-book-product-windows-x64.zip \
            neuro-book-product-linux-x64-glibc.tar.gz \
            neuro-book-windows-x64.zip \
            install.ps1 \
            install.cmd \
            install.sh; do
            curl --fail --location --retry 8 --retry-all-errors --retry-delay 3 \
              --output "public-assets/${asset}" "${base}/${asset}"
          done
      - name: Verify public payload bytes and checksums
        run: bun scripts/release/release-assets.ts verify --dir public-assets --tag "${{ github.event.release.tag_name }}" --revision "${{ github.sha }}"
      - name: Verify public GHCR digest
        env:
          IMAGE: ${{ env.APP_IMAGE_NAME }}@${{ needs.build-and-push.outputs.app-digest }}
        run: |
          docker pull "${IMAGE}"
          test "$(docker image inspect "${IMAGE}" --format '{{ index .RepoDigests 0 }}')" = "${APP_IMAGE_NAME}@${{ needs.build-and-push.outputs.app-digest }}"

  verify-public-ghcr-installation:
    needs: [verify-public-payload]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: candidate-assets
      - name: Install public GHCR instance with published Manager
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          NEURO_BOOK_MANAGER_CONFIG: ${{ runner.temp }}/neuro-book-manager/config.json
        run: |
          set -euo pipefail
          root="${RUNNER_TEMP}/public-ghcr-install"
          manager_version="$(node -p 'require("./packages/neuro-book-manager/package.json").version')"
          candidate_manifest="$PWD/candidate-assets/release-manifest.json"
          channel="$(node -p 'require(process.argv[1]).channel' "${candidate_manifest}")"
          rm -rf "$root" "${RUNNER_TEMP}/neuro-book-manager"
          mkdir -p "${RUNNER_TEMP}/neuro-book-manager"
          bunx --bun "@notnotype/neuro-book-manager@${manager_version}" install \
            --profile ghcr \
            --channel "${channel}" \
            --release-manifest "${candidate_manifest}" \
            --dir "$root" \
            --port 39487 \
            --yes
          bunx --bun "@notnotype/neuro-book-manager@${manager_version}" --root "$root" doctor --json > "${RUNNER_TEMP}/doctor-running.json"
          node -e 'const r=require(process.argv[1]); if (!r.healthy || r.checks.some((c)=>c.status === "fail")) process.exit(1)' "${RUNNER_TEMP}/doctor-running.json"
          docker compose --env-file "$root/.env" -f "$root/.deploy/docker-compose.generated.yml" stop app
          bunx --bun "@notnotype/neuro-book-manager@${manager_version}" --root "$root" doctor --json > "${RUNNER_TEMP}/doctor-stopped.json"
          node -e 'const r=require(process.argv[1]); if (!r.healthy || !r.checks.some((c)=>c.id === "service.application" && c.status === "warn")) process.exit(1)' "${RUNNER_TEMP}/doctor-stopped.json"
          bunx --bun "@notnotype/neuro-book-manager@${manager_version}" --root "$root" start
          for attempt in $(seq 1 60); do
            curl --fail --silent "http://127.0.0.1:39487/api/app/version" && exit 0
            sleep 1
          done
          docker compose --env-file "$root/.env" -f "$root/.deploy/docker-compose.generated.yml" logs --no-color app || true
          exit 1
      - name: Cleanup public GHCR instance
        if: always()
        shell: bash
        run: |
          root="${RUNNER_TEMP}/public-ghcr-install"
          if [[ -f "$root/.deploy/docker-compose.generated.yml" ]]; then
            docker compose --env-file "$root/.env" -f "$root/.deploy/docker-compose.generated.yml" down --remove-orphans || true
          fi
          rm -rf "$root" "${RUNNER_TEMP}/neuro-book-manager"

  verify-public-windows-update:
    needs: [verify-public-payload]
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BASELINE_RELEASE_TAG: v0.8.6-canary.20260717.130406Z.a91a96f
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: candidate-assets
      - name: Update public 0.8.6 Portable with exact npm Manager and candidate Manifest
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "portable-update"
          $archive = Join-Path $env:RUNNER_TEMP "portable-0.8.6.zip"
          $manifestPath = (Resolve-Path candidate-assets/release-manifest.json).Path
          $candidate = Get-Content -Raw $manifestPath | ConvertFrom-Json
          $managerVersion = (Get-Content -Raw packages/neuro-book-manager/package.json | ConvertFrom-Json).version
          $channel = $candidate.channel
          $port = 39327
          Remove-Item -LiteralPath $root -Recurse -Force -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:BASELINE_RELEASE_TAG/neuro-book-windows-x64.zip" -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $root
          $envPath = Join-Path $root "data/.env"
          $databasePath = Join-Path $root "data/workspace/.nbook/neuro-book.sqlite"
          $absoluteDatabaseUrl = "file:" + $databasePath.Replace("\", "/")
          $envText = Get-Content -Raw $envPath
          $envText = $envText -replace '(?m)^DATABASE_URL=.*$', "DATABASE_URL=$absoluteDatabaseUrl"
          $envText = $envText -replace '(?m)^NUXT_PORT=.*$', "NUXT_PORT=$port"
          $envText = $envText -replace '(?m)^PORT=.*$', "PORT=$port"
          Set-Content -LiteralPath $envPath -Value $envText -Encoding utf8
          $env:AUTH_ADMIN_PASSWORD = "release-update-password"
          try {
            bunx --bun "@notnotype/neuro-book-manager@$managerVersion" --root $root admin create release-update-admin
            if ($LASTEXITCODE -ne 0) { throw "0.8.6 create admin failed: $LASTEXITCODE" }
          } finally {
            Remove-Item Env:AUTH_ADMIN_PASSWORD -ErrorAction SilentlyContinue
          }
          $envText = Get-Content -Raw $envPath
          $envText = $envText -replace '(?m)^DATABASE_URL=.*$', 'DATABASE_URL=file:./workspace/.nbook/neuro-book.sqlite'
          Set-Content -LiteralPath $envPath -Value $envText -Encoding utf8
          $beforeHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $databasePath).Hash
          bunx --bun "@notnotype/neuro-book-manager@$managerVersion" --root $root update --channel $channel --release-manifest $manifestPath
          if ($LASTEXITCODE -ne 0) { throw "Portable candidate update failed: $LASTEXITCODE" }
          if ((Get-Content -Raw $envPath) -notmatch '(?m)^DATABASE_URL=file:\./workspace/\.nbook/neuro-book\.sqlite$') {
            throw "Portable update改写了逻辑DATABASE_URL"
          }
          if (-not (Test-Path -LiteralPath $databasePath -PathType Leaf)) { throw "Portable update丢失App SQLite" }
          if (Test-Path -LiteralPath (Join-Path $root "workspace")) { throw "Portable update创建了影子workspace" }
          $manager = Join-Path $root ".runtime/bin/neuro-book.cmd"
          $stdout = Join-Path $root "data/logs/public-update.stdout.log"
          $stderr = Join-Path $root "data/logs/public-update.stderr.log"
          $process = Start-Process -FilePath $manager -ArgumentList @("--root", $root, "start") -WorkingDirectory $env:RUNNER_TEMP -RedirectStandardOutput $stdout -RedirectStandardError $stderr -WindowStyle Hidden -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 240; $attempt++) {
              if ($process.HasExited) { break }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:$port/api/app/version" -TimeoutSec 1
                if ($response.StatusCode -eq 200) { $ready = $true; break }
              } catch {}
              Start-Sleep -Milliseconds 500
            }
            if (-not $ready) {
              Get-Content -Raw $stdout -ErrorAction SilentlyContinue | Write-Host
              Get-Content -Raw $stderr -ErrorAction SilentlyContinue | Write-Host
              throw "Updated Portable did not become ready"
            }
            $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
            $body = @{username = "release-update-admin"; password = "release-update-password"} | ConvertTo-Json -Compress
            $login = Invoke-WebRequest -Uri "http://127.0.0.1:$port/api/auth/login" -Method Post -ContentType "application/json" -Body $body -WebSession $session -TimeoutSec 10
            if ($login.StatusCode -ne 200 -or $session.Cookies.Count -lt 1) { throw "Updated Portable login failed" }
          } finally {
            if (-not $process.HasExited) { taskkill /PID $process.Id /T /F | Out-Null }
          }
          $afterHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $databasePath).Hash
          if ($beforeHash -eq $afterHash) { Write-Host "Database content unchanged by migration; administrator data still preserved." }
      - name: Cleanup public Portable update
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "portable-update") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "portable-0.8.6.zip") -Force -ErrorAction SilentlyContinue

  publish-index:
    needs: [verify-public-ghcr-installation, verify-public-windows-update]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: dist
      - name: Publish release index last
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-manifest.json
            dist/SHA256SUMS
