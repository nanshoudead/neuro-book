name: Release Product Assets

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/neuro-book
  RUNTIME_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/neuro-book-runtime

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app-digest: ${{ steps.app-build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: runtime-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RUNTIME_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

      - id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - id: app-build
        name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=runtime
            type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run release:source
      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: dist/neuro-book-source.zip

  product-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run nuxt:build
      - run: bun run release:product:linux
      - uses: actions/upload-artifact@v4
        with:
          name: product-linux
          path: dist/neuro-book-product-linux-x64-glibc.tar.gz

  product-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run nuxt:build
      - run: bun run release:product:windows
      - run: bun run package:windows-portable
      - uses: actions/upload-artifact@v4
        with:
          name: product-windows
          path: |
            dist/neuro-book-product-windows-x64.zip
            dist/neuro-book-windows-x64.zip

  assemble:
    needs: [build-and-push, source, product-linux, product-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Build release manifest
        shell: bash
        env:
          GHCR_DIGEST: ${{ needs.build-and-push.outputs.app-digest }}
        run: |
          manager_version="$(bun -e 'console.log(require("./packages/neuro-book-manager/package.json").version)')"
          if [[ "${manager_version}" == *-* ]]; then manager_tag=canary; else manager_tag=latest; fi
          published_manager="$(npm view "@notnotype/neuro-book-manager@${manager_tag}" version)"
          test "${published_manager}" = "${manager_version}"
          bun scripts/release/release-assets.ts manifest \
            --tag "${{ github.event.release.tag_name }}" \
            --revision "${{ github.sha }}" \
            --manager-version "${manager_version}" \
            --source dist/neuro-book-source.zip \
            --windows-product dist/neuro-book-product-windows-x64.zip \
            --linux-product dist/neuro-book-product-linux-x64-glibc.tar.gz \
            --portable dist/neuro-book-windows-x64.zip \
            --ghcr-ref "${APP_IMAGE_NAME}:${{ github.event.release.tag_name }}" \
            --ghcr-digest "${GHCR_DIGEST}" \
            --output dist/release-manifest.json
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/neuro-book-source.zip
            dist/neuro-book-product-windows-x64.zip
            dist/neuro-book-product-linux-x64-glibc.tar.gz
            dist/neuro-book-windows-x64.zip
            dist/release-manifest.json
            dist/SHA256SUMS

  verify-linux:
    needs: [assemble, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --linker hoisted
      - name: Download public Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --dir public-assets --clobber
      - name: Verify assets and native packages
        run: bun scripts/release/release-assets.ts verify --dir public-assets --tag "${{ github.event.release.tag_name }}" --revision "${{ github.sha }}"
      - name: Verify GHCR digest and source revision
        env:
          IMAGE: ${{ env.APP_IMAGE_NAME }}@${{ needs.build-and-push.outputs.app-digest }}
        run: |
          docker pull "${IMAGE}"
          test "$(docker image inspect "${IMAGE}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "${{ github.sha }}"
      - name: Public Manager Product Bun smoke
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          if [[ "${version}" == *-* ]]; then manager_tag=canary; channel=canary; else manager_tag=latest; channel=stable; fi
          bunx --bun "@notnotype/neuro-book-manager@${manager_tag}" --version
          root="$(mktemp -d)"
          bunx --bun "@notnotype/neuro-book-manager@${manager_tag}" install --profile product-bun --dir "${root}" --version "${version}" --channel "${channel}" --yes
          "${root}/.runtime/bin/neuro-book" doctor --json

  verify-windows:
    needs: [assemble]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Download public Portable
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --pattern neuro-book-windows-x64.zip --dir public-assets --clobber
      - name: Verify Portable executables and doctor
        shell: pwsh
        run: |
          Expand-Archive -LiteralPath public-assets/neuro-book-windows-x64.zip -DestinationPath portable
          $manifest = Get-Content -Raw portable/.deploy/installation.json | ConvertFrom-Json
          & (Join-Path portable $manifest.components.managerRuntime.path) --version
          & (Join-Path portable $manifest.components.tools.rg.path) --version
          & (Join-Path portable $manifest.components.tools.git.path) --version
          & (Join-Path portable $manifest.components.tools.git.bashPath) --version
          $doctor = & portable/.runtime/bin/neuro-book.cmd doctor --json | ConvertFrom-Json
          if (-not $doctor.healthy) { throw "Portable doctor 未通过" }

  verify:
    needs: [verify-linux, verify-windows]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release verification completed."
