services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            HOST: 0.0.0.0
            PORT: ${NUXT_PORT:-3000}
            DATABASE_KIND: ${DATABASE_KIND:-sqlite}
            DATABASE_URL: ${DATABASE_URL:-file:./workspace/.nbook/neuro-book.sqlite}
            NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:?NUXT_SESSION_PASSWORD must be set}
        ports:
            # 容器内按 Boot Config/PORT 监听 NUXT_PORT，宿主与容器必须同端口映射，
            # 否则非 3000 端口部署会映射到容器内没人监听的 3000。
            - "${NUXT_PORT:-3000}:${NUXT_PORT:-3000}"
        volumes:
            - ./workspace:/app/workspace
        restart: unless-stopped
