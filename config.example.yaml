# neuro-book Boot Config 示例。
#
# 复制为 config.yaml 后用于启动/部署期配置。
# 注意：模型 Provider、API Key、Agent Profile 默认模型、UI/editor 偏好不写在这里；
# 这些业务配置写入 workspace/.nbook/config.json 或 Project Workspace 的 .nbook/config.json。

