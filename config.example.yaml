# neuro-book 运行时配置示例。
# 复制为 config.yaml 后会挂载到容器内 /app/config.yaml，设置页也会直接写回这个文件。
# 真实 API Key 可以写在部署机器的 config.yaml 中，但不要提交真实 config.yaml。
# 全站鉴权。默认开启；设为 false 时，登录页与管理员守卫都会关闭。
auth:
  enabled: true

agent:
  tools:
    # Agent 工具白名单 / 黑名单。空数组表示不额外覆盖默认工具策略。
    allow: []
    deny: []
  profiles:
    # 每个 profile 都可以单独覆盖模型。modelKey 为 null 时使用 models.default。
    # modelKey 格式固定为 "provider/model"，例如 deepseek/deepseek-v4-flash。
    leader.default:
      model:
        modelKey: null
        temperature: null
        topK: null
        stream: true
    subagent.writer:
      model:
        modelKey: null
        temperature: null
        topK: null
        stream: true
    subagent.loreRetriever:
      model:
        modelKey: null
        temperature: null
        topK: null
        stream: true
    subagent.retrieval:
      model:
        modelKey: deepseek/deepseek-v4-flash
        temperature: null
        topK: null
        stream: true
models:
  # 默认聊天模型。这里必须指向下面 providers 中 enabled: true 的模型。
  default: deepseek/deepseek-v4-flash
  providers:
    # provider key 是模型引用里的第一段，例如 deepseek/deepseek-v4-flash 的 deepseek。
    deepseek:
      name: DeepSeek
      # adapter 决定运行时协议。OpenAI 官方接口使用 openai-official；主流 OpenAI 兼容网关使用 openai-compatible。
      adapter: deepseek-official
      options:
        # 模型 Provider 密钥写在 config.yaml，不写入 .env.docker。
        apiKey: ""
        baseURL: https://api.deepseek.com/v1
        # 如需代理，填写 http://127.0.0.1:7890 这类地址；留空表示不走代理。
        proxy: ""
        # Provider HTTP 请求超时，单位毫秒；留空使用默认 180000。
        timeoutMs: 180000
        # OpenAI-compatible 请求体扩展参数，会并入 /chat/completions body。
        requestOptions: {}
      models:
        deepseek-v4-flash:
          name: DeepSeek-V4-Flash
          id: deepseek-v4-flash
          group: deepseek
          enabled: true
          # 用于上下文预算估算；无法稳定确认窗口时填 null。
          contextWindowTokens: 262144
        deepseek-v4-pro:
          name: DeepSeek-V4-Pro
          id: deepseek-v4-pro
          group: deepseek
          enabled: false
          contextWindowTokens: 262144
    doubao:
      name: Doubao
      # OpenAI-compatible Provider 使用 OpenAI 兼容协议，但 baseURL 指向各厂商网关。
      adapter: openai-compatible
      options:
        apiKey: ""
        baseURL: https://ark.cn-beijing.volces.com/api/v3
        proxy: ""
        timeoutMs: 180000
        requestOptions: {}
      models:
        doubao-seed-2-0-pro:
          name: Doubao Seed 2.0 Pro
          id: doubao-seed-2-0-pro
          group: doubao
          enabled: false
          contextWindowTokens: 262144
    gemini:
      name: Gemini
      adapter: gemini-compatible
      options:
        apiKey: ""
        baseURL: ""
        proxy: ""
        timeoutMs: 180000
        requestOptions: {}
      models:
        gemini-3-pro-preview-maxthinking:
          name: Gemini 3 Pro Preview MaxThinking
          id: gemini-3-pro-preview-maxthinking
          group: gemini
          enabled: false
          contextWindowTokens: null
    qwen:
      name: Qwen
      adapter: openai-compatible
      options:
        apiKey: ""
        baseURL: https://dashscope.aliyuncs.com/compatible-mode/v1
        proxy: ""
        timeoutMs: 180000
        requestOptions: {}
      models:
        qwen3.6-plus:
          name: Qwen 3.6 Plus
          id: qwen3.6-plus
          group: qwen
          enabled: false
          contextWindowTokens: 262144
    siliconflow:
      name: SiliconFlow
      adapter: openai-compatible
      options:
        apiKey: ""
        baseURL: https://api.siliconflow.cn/v1
        proxy: ""
        timeoutMs: 180000
        requestOptions: {}
      models:
        deepseek-ai/DeepSeek-V4-Flash:
          name: DeepSeek-V4-Flash
          id: deepseek-ai/DeepSeek-V4-Flash
          group: deepseek
          enabled: false
          contextWindowTokens: 262144
    xiaomimimo:
      name: XiaoMiMiMo
      adapter: openai-compatible
      options:
        apiKey: ""
        baseURL: https://token-plan-cn.xiaomimimo.com/v1
        proxy: ""
        timeoutMs: 180000
        requestOptions:
          store: false
      models:
        mimo-v2.5-pro:
          name: mimo-v2.5-pro
          id: mimo-v2.5-pro
          group: mimo
          enabled: false
          contextWindowTokens: null
